name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    name: Build (${{ matrix.browser }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chrome, firefox]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build for ${{ matrix.browser }}
        run: npm run build:${{ matrix.browser }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.browser }}
          path: dist/${{ matrix.browser }}/
          retention-days: 7

  release:
    name: Package ZIPs
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build and zip all
        run: npm run zip:all

      - name: Upload Chrome ZIP
        uses: actions/upload-artifact@v4
        with:
          name: dual-sub-jellyfin-chrome
          path: releases/dual-sub-jellyfin-chrome.zip
          retention-days: 30

      - name: Upload Firefox ZIP
        uses: actions/upload-artifact@v4
        with:
          name: dual-sub-jellyfin-firefox
          path: releases/dual-sub-jellyfin-firefox.zip
          retention-days: 30
